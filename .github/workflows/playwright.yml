name: Playwright BDD Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    name: Run Playwright BDD Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout automation repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Pull Allure history from gh-pages to preserve trend data
      - name: Get Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Copy Allure history into results
        if: always()
        continue-on-error: true
        run: |
          if [ -d "gh-pages/allure-report/history" ]; then
            mkdir -p allure-results/history
            cp -r gh-pages/allure-report/history/. allure-results/history/
          fi

      - name: Generate BDD test files
        run: npx bddgen

      - name: Run Playwright tests
        run: npx playwright test --project=chromium
        env:
          CI: true
          ENV: prod
          BASE_URL: https://vibhorgoyal18.github.io/test-todo-app/

      - name: Generate Allure report
        if: always()
        run: npx allure generate allure-results --clean -o allure-report

      - name: Upload Allure report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          retention-days: 30

      - name: Upload Playwright report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 30

      # Deploy Allure report to GitHub Pages
      - name: Deploy to GitHub Pages
        if: always() && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          destination_dir: allure-report
          keep_files: true
